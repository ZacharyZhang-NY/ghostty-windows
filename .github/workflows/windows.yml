name: Windows

# Build the native Windows (win32 + WGL OpenGL) port and produce an installer.
# - Every push to main and every manual run uploads the installer as an
#   artifact on the run.
# - Pushing a tag like v1.3.2 also publishes a GitHub Release with the
#   installer attached.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download Zig directly from the official release path. The community
      # mirror-based setup actions are unreliable (mirrors intermittently
      # 404/503), so we fetch the pinned release deterministically.
      - name: Setup Zig
        shell: pwsh
        run: |
          $ver = "0.15.2"
          $url = "https://ziglang.org/download/$ver/zig-x86_64-windows-$ver.zip"
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\zig.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\zig.zip" -DestinationPath "$env:RUNNER_TEMP\zig" -Force
          "$env:RUNNER_TEMP\zig\zig-x86_64-windows-$ver" | Out-File -FilePath $env:GITHUB_PATH -Append
          # Keep Zig's global cache on the workspace drive. The default cache is
          # on C: (%APPDATA%) while the runner workspace is on D:; a build Run
          # step spanning drives trips a path assertion in the Zig 0.15.2 build
          # runner (cannot make a cross-drive path relative).
          "ZIG_GLOBAL_CACHE_DIR=$env:RUNNER_TEMP\zig-global-cache" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build (ReleaseFast)
        run: zig build -Dtarget=x86_64-windows-gnu -Dapp-runtime=win32 --release=fast -Demit-docs=false

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace '^refs/tags/v', ''
          } else {
            $v = '0.0.0-' + $env:GITHUB_SHA.Substring(0, 7)
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Installer version: $v"

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DBuildDir=$env:GITHUB_WORKSPACE\zig-out" `
            "/DAppVersion=${{ steps.ver.outputs.version }}" `
            dist\windows\ghostty.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostty-setup-x86_64
          path: dist/windows/output/ghostty-setup-x86_64.exe
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/windows/output/ghostty-setup-x86_64.exe
          generate_release_notes: true
